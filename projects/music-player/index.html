<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Audio - Premium Music Player</title>
    <meta name="description" content="A premium vanilla JavaScript music player with glassmorphism design.">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://placehold.co/180x180/8b5cf6/ffffff?text=S">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="var(--primary)"><path d="M12 3v9.28a4.39 4.39 0 00-1.5-.28 4.41 4.41 0 104.41 4.41V7h4V3h-6.91z"/></svg>
                <span>Stellar</span>
            </div>
            
            <a href="../../index.html" style="text-decoration: none; color: var(--text-muted); font-size: 0.8rem; display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Back to Portfolio
            </a>
            
            <ul class="nav-links">
                <li class="nav-item active" id="nav-home">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Home</span>
                </li>
                <li class="nav-item" id="nav-search-trigger">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>Search</span>
                </li>
                <li class="nav-item" id="nav-library">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>Liked Songs</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-view">
            <header class="view-header">
                <div class="search-bar-inline">
                    <input type="text" id="playlist-search" placeholder="Search by title or artist..." aria-label="Search tracks">
                </div>
            </header>

            <section class="content-scroller">
                <div id="home-view">
                    <div class="hero-section">
                        <div class="artwork-wrapper" id="artwork-container">
                            <canvas id="visualizer"></canvas>
                            <img id="track-artwork" src="" alt="Track Artwork" onerror="this.src='https://placehold.co/400x400/1e293b/f8fafc?text=Stellar+Audio'">
                        </div>
                        <div class="hero-info">
                            <h1 id="track-title">Select a track</h1>
                            <p id="track-artist">Unknown Artist</p>
                            <button class="btn-like-large" id="like-btn-main" aria-label="Like Track">
                                <svg id="like-icon-empty" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                                <svg id="like-icon-filled" viewBox="0 0 24 24" width="24" height="24" fill="#ff4b2b" style="display: none;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="playlist-section">
                    <h2 id="view-title">All Tracks</h2>
                    <ul class="playlist-items" id="playlist-items">
                        <!-- Tracks will be injected here by JS -->
                    </ul>
                </div>
            </section>
        </main>

        <!-- Persistent Player Bar -->
        <footer class="player-footer">
            <div class="footer-track-info">
                <img id="mini-artwork" src="" alt="" onerror="this.src='https://placehold.co/60x60/1e293b/f8fafc?text=S'">
                <div class="text-info">
                    <div id="footer-title">Stellar Audio</div>
                    <div id="footer-artist">Select a track</div>
                </div>
            </div>

            <div class="footer-controls">
                <div class="playback-buttons">
                    <button class="btn-icon" id="shuffle-btn" aria-label="Toggle Shuffle">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.45 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                    </button>
                    <button class="btn-icon" id="prev-btn" aria-label="Previous Track">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="btn-icon btn-play-pause-small" id="play-pause-btn" aria-label="Play">
                        <svg id="play-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pause-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button class="btn-icon" id="next-btn" aria-label="Next Track">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                    <button class="btn-icon" id="repeat-btn" aria-label="Toggle Repeat">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                        <span id="repeat-badge" style="display: none; position: absolute; font-size: 8px; top: -2px; right: -2px; background: var(--primary); color: white; padding: 1px 3px; border-radius: 4px;">1</span>
                    </button>
                </div>
                <div class="footer-progress">
                    <span id="current-time">0:00</span>
                    <input type="range" class="progress-bar" id="progress-bar" value="0" min="0" max="100" step="0.1" aria-label="Seek track">
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="footer-volume">
                <button class="btn-icon" id="mute-btn" aria-label="Mute Toggle">
                    <svg id="vol-high-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="vol-muted-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display: none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.03c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <input type="range" class="volume-slider" id="volume-slider" value="80" min="0" max="100" aria-label="Volume">
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
